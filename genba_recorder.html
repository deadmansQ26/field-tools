  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #000000;
      --muted: #666666;
      --primary: #1f6feb;
      --danger: #d1242f;
      --border: #d0d7de;
      --input-bg: #f6f8fa;
    }

    body.dark-mode {
      --bg: #000000;
      --card: #161b22;
      --text: #f0f6fc;
      --muted: #8b949e;
      --primary: #58a6ff;
      --danger: #f85149;
      --border: #30363d;
      --input-bg: #0d1117;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }
    body { padding: 15px; min-height: 100dvh; font-size: 16px; }

    .app { width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    
    .titlebar { display: flex; align-items: center; justify-content: space-between; }
    h1 { margin: 0; font-size: 1.2rem; }
    
    .header-actions { display: flex; gap: 8px; }
    .head-btn { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 0.95rem; cursor: pointer; }

    /* 項目リストの巨大化：1項目にリソースを集中 */
    .list-wrap { display: flex; flex-direction: column; gap: 12px; }
    .item { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 22px; }
    .item-title { font-size: 1.3rem; font-weight: bold; color: var(--text); margin-bottom: 14px; }
    
    /* 入力インターフェース：2remの巨大フォント */
    .controls { display: grid; grid-template-columns: 1fr 75px 75px; gap: 15px; height: 70px; }
    input[type="text"] { width: 100%; background: var(--input-bg); color: var(--text); border: 2px solid var(--border); border-radius: 10px; padding: 10px; font-size: 2.2rem; font-weight: bold; text-align: center; }

    .btn { border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    
    .btn-camera { background: var(--primary); color: white; }
    .cam-icon { width: 28px; height: 20px; border: 3px solid white; border-radius: 4px; position: relative; }
