<script>
// ボルトデータ（標準、旧JIS、フランジ用の多層構造）
const boltData = {
    3:  { std: 5.5, old: "", flange: "" },
    4:  { std: 7,   old: "", flange: "" },
    5:  { std: 8,   old: "", flange: "" },
    6:  { std: 10,  old: "", flange: "" },

};

const pipeData = [

    {a: 8,   b: 0.25,  bText: "1/4",   out: "13.8"},

];

// ボルト計算イベント

    if(data) {
        let html = `<div class="main-val">M${v} → 工具 ${data.std} mm</div>`;

        if(data.old) html += `<span class="info-tag tag-old">旧JIS</span> <b>${data.old}mm</b><br>`;

        res.innerHTML = html;

        res.innerHTML = `<div class="main-val">M${v} → ???</div><div class="sub-val">未登録の規格です</div>`;
    }
});

// 配管A入力
document.getElementById('pipeA').addEventListener('input', (e) => {
    const v = parseFloat(e.target.value);
    const found = pipeData.find(d => d.a === v);
    if(found) {
        document.getElementById('pipeB').value = found.b;
        updatePipeRes(found);
    }
});

// 配管B入力（小数対応）
document.getElementById('pipeB').addEventListener('input', (e) => {

        document.getElementById('pipeA').value = found.a;
        updatePipeRes(found);
    }
});

function updatePipeRes(d) {
    let tip = "";
    if (d.b % 1 !== 0) {
        // 小数の場合の計算のヒントを表示
        const decimalPart = d.b % 1;
        let frac = "";
        if(decimalPart === 0.125) frac = "1/8";
        if(decimalPart === 0.25)  frac = "1/4";
        if(decimalPart === 0.375) frac = "3/8";
        if(decimalPart === 0.5)   frac = "1/2";
        if(decimalPart === 0.75)  frac = "3/4";
        
        const whole = Math.floor(d.b) === 0 ? "" : Math.floor(d.b);
        tip = `<div class="calc-tip">💡 計算: ${d.b} は <b>${whole} ${frac}</b> と入力・表記します</div>`;
    }

    document.getElementById('pipeResult').innerText = `${d.a}A = ${d.bText}B`;
    document.getElementById('pipeSub').innerHTML = `外径: <b>${d.out} mm</b><br>インチ換算: ${d.b}" ${tip}`;
